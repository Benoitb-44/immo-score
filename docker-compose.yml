services:
  db:
    image: postgres:16-alpine
    container_name: cityrank-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-immo_score}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - immo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-immo_score}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cityrank:
    build: .
    container_name: cityrank
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./data/cerema:/app/data/cerema:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - immo-network

  # INFRA-08 : Serveur MCP PostgreSQL lecture seule pour agents Claude Code
  # Accès : https://mcp-db.cityrank.fr (nginx proxy → 127.0.0.1:3002)
  # User : cityrank_ro — SELECT uniquement sur immo_score, AUCUN droit sur public
  mcp-db:
    image: node:22-alpine
    container_name: cityrank-mcp-db
    restart: unless-stopped
    environment:
      - DATABASE_URL_RO=${DATABASE_URL_RO}
    volumes:
      - ./scripts/mcp-db-start.sh:/start.sh:ro
    entrypoint: ["sh", "/start.sh"]
    networks:
      - immo-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: cityrank-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/nginx/.htpasswd-mcp-db:/etc/nginx/.htpasswd-mcp-db:ro
    depends_on:
      - cityrank
      - mcp-db
    networks:
      - immo-network

volumes:
  postgres_data:

networks:
  immo-network:
    driver: bridge
