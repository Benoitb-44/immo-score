name: Deploy CityRank

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            if [ -d ~/immo-score ] && [ ! -d ~/cityrank ]; then
              mv ~/immo-score ~/cityrank
            fi
            cd ~/cityrank
            git fetch origin main
            git reset --hard origin/main
            docker compose build --no-cache
            docker stop $(docker ps -q --filter "publish=3001") 2>/dev/null || true
            docker compose up -d
            docker image prune -f
            echo "⏳ Attente PostgreSQL ready..."
            sleep 5
            echo "⏳ Application des migrations Prisma..."
            docker exec cityrank npx prisma migrate deploy
            if [ $? -ne 0 ]; then
              echo "❌ Migration Prisma failed"
              exit 1
            fi
            echo "✅ Migrations appliquées"
            echo "⏳ Healthcheck post-deploy..."
            sleep 45
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Healthcheck failed (HTTP $HTTP_CODE)"
              exit 1
            fi
            echo "✅ Healthcheck OK (HTTP $HTTP_CODE)"

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Notify Telegram on failure
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🚨 CityRank deploy FAILED%0A%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.sha }}%0A%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
